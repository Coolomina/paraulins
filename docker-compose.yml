version: '3.8'

services:
  family-voices:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - DATA_DIR=/app/data
      - MAX_AUDIO_SIZE=20971520  # 20MB
      - MAX_IMAGE_SIZE=10485760  # 10MB
    volumes:
      # Mount persistent storage for user data
      - family_voices_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "com.family-voices.description=Family Voices - Pronunciation Evolution Tracker"
      - "com.family-voices.version=1.0.0"

volumes:
  family_voices_data:
    driver: local
    labels:
      - "com.family-voices.description=Persistent storage for Family Voices user data"
