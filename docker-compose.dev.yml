version: '3.8'

services:
  family-voices-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder  # Use builder stage for development
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - SECRET_KEY=dev-secret-key-not-for-production
      - DATA_DIR=/app/data
    volumes:
      # Mount source code for development
      - .:/app
      # Mount persistent storage for user data
      - family_voices_dev_data:/app/data
    restart: unless-stopped
    command: ["python", "app.py"]
    labels:
      - "com.family-voices.description=Family Voices - Development Environment"
      - "com.family-voices.version=1.0.0-dev"

volumes:
  family_voices_dev_data:
    driver: local
    labels:
      - "com.family-voices.description=Development storage for Family Voices"
